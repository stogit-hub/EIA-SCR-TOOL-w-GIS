                  <div style={{display:'flex',justifyContent:'flex-end',paddingTop:14,borderTop:`1px solid ${C.borderLt}`}}>
                    <button style={btnPrimary(false)} onClick={buildResult}>Generate Screening Assessment →</button>
                  </div>
                )}
              </>);
            })()}
          </div>}
        </div>

        {/* ═══ STEP 5 ══════════════════════════════════════════ */}
        {step>=5&&result&&verdict&&(
          <div style={{...card,animation:'fadeUp 0.3s ease'}}>
            <div style={cardHead(true)}>
              {stepBadge(5,true,false)}
              <div>
                <div style={{fontSize:14,fontWeight:700}}>EIA Screening Assessment</div>
                <div style={{fontSize:11,color:'rgba(255,255,255,0.5)',marginTop:1}}>Preliminary opinion · {new Date().toLocaleDateString('en-GB',{day:'numeric',month:'long',year:'numeric'})}</div>
              </div>
            </div>
            <div style={cardBody}>

              {/* Verdict banner */}
              <div style={{background:verdict.bg,border:`1px solid ${verdict.bdColor}`,borderLeft:`4px solid ${verdict.color}`,borderRadius:7,padding:'16px 20px',marginBottom:20,display:'flex',alignItems:'flex-start',gap:16}}>
                <div style={{width:60,height:60,borderRadius:'50%',border:`3px solid ${verdict.color}`,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',flexShrink:0}}>
                  <div style={{fontSize:24,fontWeight:800,color:verdict.color,lineHeight:1}}>{result.total}</div>
                  <div style={{fontSize:9,color:C.muted,letterSpacing:'0.04em'}}>/100</div>
                </div>
                <div style={{flex:1}}>
                  <span style={{display:'inline-block',background:verdict.color,color:C.white,borderRadius:4,padding:'2px 9px',fontSize:11,fontWeight:700,letterSpacing:'0.04em',textTransform:'uppercase',marginBottom:6}}>{verdict.label}</span>
                  <div style={{fontSize:16,fontWeight:700,color:C.ink,marginBottom:5,lineHeight:1.3}}>{verdict.title}</div>
                  <div style={{fontSize:13,color:C.slate,lineHeight:1.6}}>{verdict.body}</div>
                  <div style={{marginTop:9,height:4,background:C.light,borderRadius:2,overflow:'hidden'}}>
                    <div style={{height:'100%',background:verdict.color,width:result.total+'%',borderRadius:2,transition:'width 1s ease'}}/>
                  </div>
                  <div style={{display:'flex',justifyContent:'space-between',fontSize:10,color:C.muted,marginTop:3}}>
                    <span>Threshold: {result.tScore}/50{result.threshProximityBonus > 0 && <span style={{marginLeft:4,color:'#b45309',fontWeight:600}} title={`+${result.threshProximityBonus} pts — value within 90% of a statutory threshold`}>⚠ near threshold</span>}</span>
                    <span>Environmental: {result.sScore}/50</span>
                  </div>
                </div>
              </div>

              {/* Summary grid */}
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14,marginBottom:18}}>
                {/* Development */}
                <div style={{border:`1px solid ${C.border}`,borderRadius:7,overflow:'hidden'}}>
                  <div style={{background:C.navy,padding:'9px 14px',fontSize:12,fontWeight:700,color:C.white}}>Development · Threshold Factors</div>
                  <div style={{padding:'13px 15px'}}>
                    {effectiveArea&&<div style={{fontSize:12,color:C.slate,marginBottom:8}}>Site area: <strong>{effectiveArea.toFixed(2)} ha</strong></div>}
                    {selectedCats.map(cat=>(
                      <div key={cat.code} style={{marginBottom:10,paddingBottom:10,borderBottom:`1px solid ${C.borderLt}`}}>
                        <div style={{fontSize:12,fontWeight:700,color:C.navy,marginBottom:4}}>Sch 2({cat.code}) {cat.name}</div>
                        {cat.qs.map(q=>{
                          const a=answers[`${cat.code}_${q.id}`];
                          const nv=numericVals[`${cat.code}_${q.id}`];
                          return a?<div key={q.id} style={{fontSize:12,color:C.slate,paddingLeft:10,marginBottom:2}}>
                            <span style={{color:C.faint}}>—</span> {q.txt}: <strong>{a.l}</strong>{nv?` (${nv} ${q.unit||''})`:''}
                          </div>:null;
                        })}
                      </div>
                    ))}
                  </div>
                </div>

                {/* Environmental sensitivities */}
                <div style={{border:`1px solid ${C.border}`,borderRadius:7,overflow:'hidden'}}>
                  <div style={{background:C.navy,padding:'9px 14px',fontSize:12,fontWeight:700,color:C.white}}>Environmental Sensitivities</div>
                  <div style={{padding:'13px 15px'}}>
                    {(()=>{
                      const items=[];
                      SENS_A.forEach(l=>{
                        const st=layerState[l.id]; const hit=st===true;
                        const distM=layerDist[l.id]; const tier=distTier(distM,hit); const dl=fmtDist(distM,hit);
                        if(hit){items.push({text:`${l.full} — on site`,color:C.red,bold:true});}
                        else if(tier==='w1km'&&dl){items.push({text:`${l.full} — ${dl}`,color:C.red,bold:true});}
                        else if((tier==='w5km'||tier==='w10km')&&dl){items.push({text:`${l.full} — ${dl}`,color:C.slate,bold:false});}
                      });
                      [...SENS_B,...SENS_C].forEach(l=>{
                        const st=layerState[l.id];
                        const hit=st===true||(l.fz&&manualTicks[l.id]);
                        const distM=layerDist[l.id]; const tier=distTier(distM,hit); const dl=fmtDist(distM,hit);
                        if(hit){items.push({text:`${l.full} — ${dl||'on site'}`,color:C.amber,bold:true});}
                        else if((tier==='w1km'||tier==='w5km')&&dl){items.push({text:`${l.full} — ${dl}`,color:C.amber,bold:false});}
                      });
                      if(!items.length)return<div style={{fontSize:13,color:C.muted}}>No significant sensitivities detected within search radius.</div>;
                      return items.map((it,i)=><div key={i} style={{fontSize:12,color:it.color,fontWeight:it.bold?700:400,padding:'3px 0',display:'flex',gap:6,alignItems:'flex-start'}}><span>•</span>{it.text}</div>);
                    })()}
                  </div>
                </div>
              </div>

              {/* Reg 2(1) proximity table */}
              {apiMode==='api'&&(
                <div style={{marginBottom:18}}>
                  <div style={{fontSize:12,fontWeight:700,color:C.navy,marginBottom:8}}>Regulation 2(1) Proximity Detail</div>
                  <table style={{width:'100%',borderCollapse:'collapse',fontSize:12}}>
                    <thead><tr style={{background:C.navy}}>
                      <th style={{padding:'7px 12px',textAlign:'left',color:C.white,fontWeight:700,borderRadius:'4px 0 0 0'}}>Designation</th>
                      <th style={{padding:'7px 12px',textAlign:'left',color:C.white,fontWeight:700}}>Nearest distance</th>
                      <th style={{padding:'7px 12px',textAlign:'left',color:C.white,fontWeight:700,borderRadius:'0 4px 0 0'}}>Flag</th>
                    </tr></thead>
                    <tbody>
                      {SENS_A.map((l,i)=>{
                        const st=layerState[l.id]; const hit=st===true;
                        const distM=layerDist[l.id]; const tier=distTier(distM,hit); const dl=fmtDist(distM,hit);
                        const flag=hit||tier==='w1km';
                        return(
                          <tr key={l.id} style={{background:i%2===0?C.off:C.white,borderBottom:`1px solid ${C.borderLt}`}}>
                            <td style={{padding:'7px 12px',color:C.ink,fontWeight:flag?700:400}}>{l.full}</td>
                            <td style={{padding:'7px 12px',color:flag?C.red:C.slate,fontWeight:flag?700:400}}>{dl||'Not found within 10 km'}</td>
                            <td style={{padding:'7px 12px'}}>
                              {flag&&<span style={{background:C.red,color:C.white,borderRadius:4,padding:'1px 8px',fontSize:10,fontWeight:700}}>⚠ Screening sensitivity</span>}
                              {!flag&&tier==='w5km'&&<span style={{background:C.amberLt,color:C.amber,borderRadius:4,padding:'1px 8px',fontSize:10,fontWeight:600,border:`1px solid ${C.amberBd}`}}>Within 5 km</span>}
                              {!flag&&tier==='w10km'&&<span style={{color:C.muted,fontSize:11}}>Within 10 km</span>}
                              {!flag&&(tier==='beyond'||tier==='unknown'||!dl)&&<span style={{color:C.faint,fontSize:11}}>Not detected nearby</span>}
                            </td>
                          </tr>
                        );
                      })}
                    </tbody>
                  </table>
                </div>
              )}

              {/* Additional designations summary table (SENS_B + SENS_C merged) */}
              {apiMode==='api'&&(
                <div style={{marginBottom:18}}>
                  <div style={{fontSize:12,fontWeight:700,color:C.navy,marginBottom:8}}>Additional Environmental Designations Detail</div>
                  <table style={{width:'100%',borderCollapse:'collapse',fontSize:12}}>
                    <thead><tr style={{background:C.navy}}>
                      <th style={{padding:'7px 12px',textAlign:'left',color:C.white,fontWeight:700,borderRadius:'4px 0 0 0'}}>Designation</th>
                      <th style={{padding:'7px 12px',textAlign:'left',color:C.white,fontWeight:700}}>Nearest distance</th>
                      <th style={{padding:'7px 12px',textAlign:'left',color:C.white,fontWeight:700,borderRadius:'0 4px 0 0'}}>Status</th>
                    </tr></thead>
                    <tbody>
                      {[...SENS_B,...SENS_C].map((l,i)=>{
                        const st=layerState[l.id]; const hit=st===true||(l.fz&&manualTicks[l.id]);
                        const distM=layerDist[l.id]; const tier=distTier(distM,hit); const dl=fmtDist(distM,hit);
                        const flag=hit||tier==='w1km';
                        return(
                          <tr key={l.id} style={{background:i%2===0?C.off:C.white,borderBottom:`1px solid ${C.borderLt}`}}>
                            <td style={{padding:'7px 12px',color:C.ink,fontWeight:flag?700:400}}>{l.full}</td>
                            <td style={{padding:'7px 12px',color:flag?C.red:C.slate,fontWeight:flag?700:400}}>
                              {l.fz ? <em style={{color:'#1d6fa5',fontSize:11}}>Loaded automatically from EA WMS on map</em> : (dl||`Not found within ${searchRadius} km`)}
                              {layerMeta[l.id]?.['listed-building-grade'] && (
                                <span style={{marginLeft:6,background:layerMeta[l.id]['listed-building-grade']==='I'?'#7c3aed':layerMeta[l.id]['listed-building-grade']==='II*'?'#b45309':C.navy,color:'white',borderRadius:3,padding:'1px 6px',fontSize:9,fontWeight:700}}>
                                  Grade {layerMeta[l.id]['listed-building-grade']}
                                </span>
                              )}
                            </td>
                            <td style={{padding:'7px 12px'}}>
                              {hit&&<span style={{background:C.red,color:C.white,borderRadius:4,padding:'1px 8px',fontSize:10,fontWeight:700}}>On site</span>}
                              {!hit&&tier==='w1km'&&<span style={{background:C.redLt,color:C.red,borderRadius:4,padding:'1px 8px',fontSize:10,fontWeight:600,border:`1px solid ${C.redBd}`}}>Within 1 km</span>}
                              {!hit&&tier==='w5km'&&<span style={{background:C.amberLt,color:C.amber,borderRadius:4,padding:'1px 8px',fontSize:10,fontWeight:600,border:`1px solid ${C.amberBd}`}}>Within 5 km</span>}
                              {!hit&&tier==='w10km'&&<span style={{color:C.muted,fontSize:11}}>Within search area</span>}
                              {!hit&&l.fz&&manualTicks[l.id]&&<span style={{background:C.amberLt,color:C.amber,borderRadius:4,padding:'1px 8px',fontSize:10,fontWeight:600,border:`1px solid ${C.amberBd}`}}>Confirmed (manual)</span>}
                              {!hit&&!l.fz&&(tier==='beyond'||tier==='unknown'||!dl)&&<span style={{color:C.faint,fontSize:11}}>Not detected nearby</span>}
                            </td>
                          </tr>
                        );
                      })}
                    </tbody>
                  </table>
                </div>
              )}

              {/* ── GIS Map Section ── */}
              {apiMode==='api'&&siteData&&(
                <div style={{border:`1px solid ${C.border}`,borderRadius:7,overflow:'hidden',marginBottom:18}}>
                  <div style={{background:C.navy,padding:'9px 14px',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
                    <div style={{fontSize:12,fontWeight:700,color:C.white}}>Environmental Sensitivities Plan — GIS Map</div>
                    <div style={{display:'flex',alignItems:'center',gap:8}}>
                      <span style={{fontSize:11,color:'rgba(255,255,255,0.6)'}}>View extent:</span>
                      {[1,2,3].map(km=>(
                        <button key={km} onClick={()=>setMapZoom(km)} style={{background:mapZoom===km?'rgba(255,255,255,0.25)':'transparent',border:'1px solid rgba(255,255,255,0.3)',color:mapZoom===km?C.white:'rgba(255,255,255,0.6)',borderRadius:4,padding:'2px 10px',cursor:'pointer',fontSize:11,fontWeight:mapZoom===km?700:400,fontFamily:F}}>
                          {km}km
                        </button>
                      ))}
                    </div>
                  </div>
                  <div style={{padding:'14px 16px'}}>
                    <GisMap
                      key={mapZoom}
                      siteData={siteData?.gj}
                      centroid={siteData?.centroid}
                      layerGeoms={layerGeoms}
                      mapRadiusKm={mapZoom}
                    />
                  </div>
                </div>
              )}

              {/* Email */}
              <div style={{border:`1px solid ${C.border}`,borderRadius:7,padding:'15px 18px',marginBottom:18,background:C.off}}>
                <div style={{fontSize:13,fontWeight:700,color:C.ink,marginBottom:3,display:'flex',alignItems:'center',gap:7}}>
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke={C.teal} strokeWidth="2"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
                  Email results
                </div>
                <div style={{fontSize:12,color:C.muted,marginBottom:10}}>Send a copy of this screening assessment to your inbox.</div>
                <div style={{display:'flex',gap:7,flexWrap:'wrap'}}>
                  <input type="email" value={emailAddr} onChange={e=>setEmailAddr(e.target.value)} placeholder="your@email.com" style={{flex:1,minWidth:200,padding:'7px 11px',border:`1.5px solid ${C.border}`,borderRadius:5,fontSize:13,outline:'none',fontFamily:F}}/>
                  <button onClick={()=>alert('Email functionality coming soon — please use Print / Save as PDF for now.')} style={btnTeal}>Send</button>
                </div>
                <div style={{fontSize:11,color:C.faint,marginTop:6}}>Your address will not be stored. Feature coming soon.</div>
              </div>

              <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
                <button style={btnOutline} onClick={()=>window.print()}>Print / Save as PDF</button>
                <button style={btnTeal} onClick={()=>{
                  // Build CSV rows
                  const esc = v => `"${String(v).replace(/"/g,'""')}"`;
                  const date = new Date().toLocaleDateString('en-GB');
                  const rows = [];

                  // Header block
                  rows.push(['EIA Screening Assessment — TCPA EIA Regulations 2017 Schedule 2']);
                  rows.push(['Date', date]);
                  rows.push(['Site area (ha)', effectiveArea ? effectiveArea.toFixed(2) : '']);
                  rows.push(['Overall score', result.total + '/100']);
                  rows.push(['Threshold score', result.tScore + '/50']);
                  rows.push(['Environmental score', result.sScore + '/50']);
                  rows.push(['Screening verdict', verdict.label]);
                  rows.push([]);

                  // Development / threshold section
                  rows.push(['--- DEVELOPMENT TYPES & THRESHOLD ANSWERS ---']);
                  rows.push(['Schedule 2 Code', 'Development Type', 'Question', 'Answer', 'Value entered']);
                  selectedCats.forEach(cat => {
                    cat.qs.forEach(q => {
                      const a = answers[`${cat.code}_${q.id}`];
                      const nv = numericVals[`${cat.code}_${q.id}`];
                      rows.push([
                        `Sch 2(${cat.code})`,
                        cat.name,
                        q.txt,
                        a ? a.l : '',
                        nv ? `${nv} ${q.unit||''}`.trim() : '',
                      ]);
                    });
                  });
                  rows.push([]);

                  // Reg 2(1) sensitivity section
                  rows.push(['--- REGULATION 2(1) SENSITIVE AREAS (searched to 10 km) ---']);
                  rows.push(['Designation', 'Abbreviation', 'Status', 'Nearest Distance', 'Distance Band', 'Screening Flag']);
                  SENS_A.forEach(l => {
                    const st = layerState[l.id];
                    const hit = st === true;
                    const distM = layerDist[l.id];
                    const tier = distTier(distM, hit);
                    const dl = fmtDist(distM, hit) || 'Not found within 10 km';
                    const statusTxt = st === 'checking' ? 'Checking…'
                      : st === true ? 'Detected on site'
                      : st === false ? 'Not detected within 10 km'
                      : st === 'unknown' ? 'Unverified'
                      : st === 'manual' ? (manualTicks[l.id] ? 'Confirmed (manual)' : 'Not confirmed (manual)')
                      : '';
                    const band = hit ? 'On site'
                      : tier === 'w1km' ? 'Within 1 km'
                      : tier === 'w5km' ? 'Within 5 km'
                      : tier === 'w10km' ? 'Within 10 km'
                      : 'Beyond 10 km / not found';
                    const flag = hit || tier === 'w1km' ? 'EIA SCREENING SENSITIVITY' : '';
                    rows.push([l.full, l.label, statusTxt, dl, band, flag]);
                  });
                  rows.push([]);

                  // Additional designations section (SENS_B + SENS_C consolidated)
                  rows.push([`--- ADDITIONAL DESIGNATIONS (searched to ${searchRadius} km) ---`]);
                  rows.push(['Designation', 'Status', 'Nearest distance from centroid', 'Distance band', 'Note']);
                  [...SENS_B, ...SENS_C].forEach(l => {
                    const st = layerState[l.id];
                    const hit = st === true || (l.fz && manualTicks[l.id]);
                    const distM = layerDist[l.id];
                    const tier = distTier(distM, hit);
                    const dl = fmtDist(distM, hit) || '';
                    const statusTxt = hit ? 'On site (intersects boundary)'
                      : l.fz ? (manualTicks[l.id] ? 'Confirmed (manual)' : 'Manual check required')
                      : st === true ? 'Detected within search radius'
                      : st === false ? 'Not detected'
                      : st === 'unknown' ? 'Unverified' : '';
                    const band = hit ? 'On site'
                      : tier === 'w1km' ? 'Within 1 km'
                      : tier === 'w5km' ? 'Within 5 km'
                      : tier === 'w10km' ? 'Within search radius'
                      : 'Not detected';
                    const note = l.fz ? 'Verify via EA Flood Map for Planning' : '';
                    const grade = layerMeta[l.id]?.['listed-building-grade'] ? `Grade ${layerMeta[l.id]['listed-building-grade']}` : '';
                    rows.push([l.full, statusTxt, dl, band, note || grade]);
                  });
                  rows.push([]);
                  rows.push(['Disclaimer: This is a preliminary screening opinion only. It does not constitute professional advice and cannot replace a formal EIA Screening Opinion from the Local Planning Authority.']);

                  // Convert to CSV string
                  const csv = rows.map(r => Array.isArray(r) ? r.map(esc).join(',') : esc(r)).join('\r\n');
                  const blob = new Blob(['\uFEFF'+csv], {type:'text/csv;charset=utf-8;'});
                  const url = URL.createObjectURL(blob);
                  const a = document.createElement('a');
                  a.href = url;
                  a.download = `EIA_Screening_${date.replace(/\//g,'-')}.csv`;
                  document.body.appendChild(a); a.click();
                  document.body.removeChild(a); URL.revokeObjectURL(url);
                }}>
                  <span style={{display:'flex',alignItems:'center',gap:6}}>
                    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                    Export CSV
                  </span>
                </button>
                <button style={btnOutline} onClick={reset}>New Assessment</button>
                <button style={{...btnOutline,marginLeft:'auto'}} onClick={()=>setPage('help')}>Methodology →</button>
              </div>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

/* ── GIS Style definitions (EP GIS Style Guide) ─────────── */
const GIS_STYLES = {
  // ── Flood zones: bottom of draw order, above basemap ──────
  // Style guide: FZ2 = very light blue 40%, FZ3 = light blue 40%

  'flood-zone-3':            {type:'fill',  color:'#5b9bd5', alpha:0.6},  // light blue, 60% transparency
  // ── Other fills ────────────────────────────────────────────
  'sac':                     {type:'fill',  color:'#008080', alpha:0.2},

  'conservation-area':       {type:'fill',  color:'#F4A460', alpha:0.4},
  'national-nature-reserve': {type:'fill',  color:'#008080', alpha:0.35},
  'local-nature-reserve':    {type:'fill',  color:'#FFD700', alpha:0.4},
  // ── Scheduled Monument: peach/beige fill, 20% transparency ─

  // ── Hatches ────────────────────────────────────────────────

  'ramsar':                  {type:'hatch', fill:'#00008b', outline:'#00008b', outlineW:1, hatchW:1, angle:45, sep:10},
  'nat-park':                {type:'hatch', fill:'#ff4444', outline:'#ff4444', outlineW:1, hatchW:1, angle:45, sep:12},
  'aonb':                    {type:'hatch', fill:'#ff4444', outline:'#ff4444', outlineW:1, hatchW:1, angle:45, sep:12},
  'aqma':                    {type:'hatch', fill:'#00008b', outline:'#00008b', outlineW:1, hatchW:1, angle:45, sep:5},
  'registered-park-garden':  {type:'hatch', fill:'#FFB6C1', outline:null,    outlineW:0, hatchW:4, angle:45, sep:6},
  // ── Dots ───────────────────────────────────────────────────

  'local-wildlife-site':     {type:'dots',  dotColor:'#FFA500', outlineColor:'#FFA500', dotSize:4, dotSep:8},
  // ── Listed buildings: grade-specific diamonds ──────────────
  // Grade I = red diamond, Grade II* = green diamond, Grade II = blue diamond
  // The 'listed-building' key is the default; grade overrides applied in drawLayerGeoms
  'listed-building':         {type:'diamond', fill:'#0000FF', outline:'#000000', outlineW:1, size:8},
  'listed-building-I':       {type:'diamond', fill:'#CC0000', outline:'#000000', outlineW:1, size:8},
  'listed-building-II*':     {type:'diamond', fill:'#228B22', outline:'#000000', outlineW:1, size:8},
  'listed-building-II':      {type:'diamond', fill:'#0000FF', outline:'#000000', outlineW:1, size:8},
};
const GIS_LABELS = {
  'sssi':'Site of Special Scientific Interest (SSSI)',
  'spa':'Special Protection Area (SPA)',
  'sac':'Special Area of Conservation (SAC)',
  'ramsar':'Ramsar Wetland Site',
  'nat-park':'National Park',
  'aonb':'Area of Outstanding Natural Beauty (AONB)',
  'whs':'World Heritage Site',
  'conservation-area':'Conservation Area',
  'scheduled-monument':'Scheduled Monument',
  'ancient-woodland':'Ancient Woodland',
  'aqma':'Air Quality Management Area (AQMA)',
  'listed-building':     'Listed Building',
  'listed-building-I':   'Listed Building – Grade I',
  'listed-building-II*': 'Listed Building – Grade II*',
  'listed-building-II':  'Listed Building – Grade II',
  'national-nature-reserve':'National Nature Reserve (NNR)',
  'local-nature-reserve':'Local Nature Reserve (LNR)',
  'local-wildlife-site':'Local Wildlife Site / SINC',
  'registered-park-garden':'Registered Park and Garden',
  'flood-zone-2':'Flood Zone 2 (River & Sea Flooding)',
  'flood-zone-3':'Flood Zone 3 (River & Sea Flooding)',
};
const ALL_LAYER_IDS = [
  ...SENS_A.map(l=>l.id),...SENS_B.map(l=>l.id),...SENS_C.map(l=>l.id),
];

/* ── GisMap component ────────────────────────────────────── */
function GisMap({ siteData, centroid, layerGeoms, mapRadiusKm }) {

  // ── Canvas dimensions (A4 portrait @ 96 dpi) ───────────────
  const W=794, H=1123;
  // Map viewport — leave room for outer border (8px) + inner margin (8px)
  const BORDER=4, PAD=12;
  const ML=BORDER+PAD, MT=BORDER+PAD;
  const MR=W-BORDER-PAD, MB=820;   // MB chosen to give ~183px info block
  const MW=MR-ML, MH=MB-MT;        // 754 × 792 px

  // Info block dimensions
  const INFO_T=MB+1, INFO_B=H-BORDER-PAD;
  const INFO_H=INFO_B-INFO_T;      // ~183px

  const canvasRef = useRef(null);
  const [rendering, setRendering] = useState(true);
  const [mapInfoText, setMapInfoText] = useState('');
  const [floodStatus, setFloodStatus] = useState('idle'); // idle|loading|ok|failed

  // ── Projection helpers ──────────────────────────────────────
  // Web Mercator Y (metres) for a latitude
  const latToMercY = lat => Math.log(Math.tan(Math.PI/4 + lat*Math.PI/360));

  // Project WGS84 → canvas pixel using Mercator for y-axis (matches tile projection)
  const extMercY = ext => ({ minY: latToMercY(ext.minLat), maxY: latToMercY(ext.maxLat) });

  const proj = (lng, lat, ext, merc) => ({
    x: ML + (lng-ext.minLng)/(ext.maxLng-ext.minLng)*MW,
    y: MT + (merc.maxY-latToMercY(lat))/(merc.maxY-merc.minY)*MH,
  });

  // ── Map extent ──────────────────────────────────────────────
  const getExtent = () => {
    if (!centroid) return null;
    const R = mapRadiusKm;
    const latBuf = R / 111.32;
    const lngBuf = R / (111.32 * Math.cos(centroid.lat * Math.PI / 180));
    // Match viewport aspect ratio in Mercator space
    const merc0 = { minY: latToMercY(centroid.lat-latBuf), maxY: latToMercY(centroid.lat+latBuf) };
    const mercH = merc0.maxY - merc0.minY;
    const mercW = (lngBuf*2) / MW * MH;  // mercator width matching MW/MH ratio
    // Actual lng extent: keep symmetric
    let dLng = lngBuf, dLat = latBuf;
    // Adjust so the Mercator aspect ratio matches the canvas
    const canvasAsp = MW / MH;
    const geoAspMerc = (dLng*2) / mercH;
    if (geoAspMerc < canvasAsp) dLng = mercH * canvasAsp / 2;
    else { /* increase mercH to match */ }
    return {
      minLat: centroid.lat - dLat, maxLat: centroid.lat + dLat,
      minLng: centroid.lng - dLng, maxLng: centroid.lng + dLng,
    };
  };

  // ── Scale calculation ───────────────────────────────────────
  const calcScale = ext => {
    if (!ext) return { scale:10000, barM:500, pixPerM:1 };
    const mapWm = (ext.maxLng-ext.minLng) * 111320 * Math.cos(centroid.lat*Math.PI/180);
    const pixPerM = MW / mapWm;
    // Pick nearest round paper scale
    const scalePaper = (1/pixPerM) / 0.000264583;
    const scales = [500,1000,2000,2500,5000,10000,20000,25000,50000,100000];
    const scale = scales.find(s=>s >= scalePaper) || scales[scales.length-1];
    // Pick barM from clean values only — these all produce clean labels (no 0.505km etc.)
    // Candidates must divide evenly into halves: 50→25+25, 100→50+50, 500→250+250, etc.
    const bars = [25,50,100,200,250,500,1000,2000,2500,5000,10000];
    const barTargetM = (MW * 0.38) / pixPerM;
    const barM = bars.reduce((a,b) => Math.abs(b-barTargetM) < Math.abs(a-barTargetM) ? b : a);
    return { scale, barM, pixPerM };
  };

  const hexToRgb = hex => {
    const r=/^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
    return r?{r:parseInt(r[1],16),g:parseInt(r[2],16),b:parseInt(r[3],16)}:{r:128,g:128,b:128};
  };

  // ── WKT → pixel paths ───────────────────────────────────────
  const wktToPxPaths = (wkt, ext, merc) => {
    if (!wkt) return [];
    const rings = wkt.match(/\(([^()]+)\)/g)||[];
    return rings.map(rs=>{
      const pts=[]; const re=/([-\d.]+)\s+([-\d.]+)/g; let m;
      while((m=re.exec(rs))!==null) pts.push(proj(parseFloat(m[1]),parseFloat(m[2]),ext,merc));
      return pts;
    }).filter(p=>p.length>1);
  };

  const mkPath2D = paths => {
    const p = new Path2D();
    paths.forEach(ring=>{ if(!ring.length) return; p.moveTo(ring[0].x,ring[0].y); ring.slice(1).forEach(pt=>p.lineTo(pt.x,pt.y)); p.closePath(); });
    return p;
  };

  // ── Hatch drawing ───────────────────────────────────────────
  const drawHatch = (ctx, p2d, fill, outlineColor, outlineW, hatchW, angle, sep) => {
    ctx.save(); ctx.clip(p2d);
    ctx.strokeStyle=fill; ctx.lineWidth=hatchW;
    const a=angle*Math.PI/180, diag=Math.sqrt(MW*MW+MH*MH)*2;
    for(let d=-diag;d<diag;d+=sep){
      ctx.beginPath();
      ctx.moveTo(ML+MW/2+d*Math.cos(a+Math.PI/2)-diag*Math.cos(a),MT+MH/2+d*Math.sin(a+Math.PI/2)-diag*Math.sin(a));
      ctx.lineTo(ML+MW/2+d*Math.cos(a+Math.PI/2)+diag*Math.cos(a),MT+MH/2+d*Math.sin(a+Math.PI/2)+diag*Math.sin(a));
      ctx.stroke();
    }
    ctx.restore();
    if(outlineColor){ctx.strokeStyle=outlineColor;ctx.lineWidth=outlineW;ctx.stroke(p2d);}
  };

  // ── Layer drawing ───────────────────────────────────────────
  // Draw all geometries for a layer.
  // Items may be plain WKT strings OR {wkt, grade} objects (listed buildings).
  const drawLayerGeoms = (ctx, layerId, items, ext, merc) => {
    items.forEach(item => {
      // Unwrap: support both plain string and {wkt, grade} objects
      const wkt    = (typeof item === 'string') ? item : item.wkt;
      const grade  = (typeof item === 'string') ? null  : (item.grade || '');

      // Grade-specific style for listed buildings; falls back to base style
      const styleKey = (layerId === 'listed-building' && grade)
        ? ('listed-building-' + grade)  // e.g. 'listed-building-I', 'listed-building-II*'
        : layerId;
      const st = GIS_STYLES[styleKey] || GIS_STYLES[layerId];
      if (!st) return;

      if (st.type === 'fill') {
        const paths = wktToPxPaths(wkt, ext, merc); if(!paths.length) return;
        const rgb = hexToRgb(st.color);
        ctx.save(); ctx.fillStyle=`rgba(${rgb.r},${rgb.g},${rgb.b},${st.alpha})`; ctx.fill(mkPath2D(paths)); ctx.restore();

      } else if (st.type === 'hatch') {
        const paths = wktToPxPaths(wkt, ext, merc); if(!paths.length) return;
        drawHatch(ctx, mkPath2D(paths), st.fill, st.outline||null, st.outlineW||0, st.hatchW, st.angle, st.sep);

      } else if (st.type === 'dots') {
        const paths = wktToPxPaths(wkt, ext, merc); if(!paths.length) return;
        const p2d = mkPath2D(paths);
        ctx.save(); ctx.clip(p2d);
        let mnX=Infinity,mxX=-Infinity,mnY=Infinity,mxY=-Infinity;
        paths.flat().forEach(p=>{mnX=Math.min(mnX,p.x);mxX=Math.max(mxX,p.x);mnY=Math.min(mnY,p.y);mxY=Math.max(mxY,p.y);});
        const sep = st.dotSep || 8;
        for(let px=mnX-sep;px<mxX+sep;px+=sep) for(let py=mnY-sep;py<mxY+sep;py+=sep){
          ctx.beginPath(); ctx.arc(px,py,st.dotSize/2,0,Math.PI*2);
          ctx.fillStyle=st.dotColor; ctx.fill();
          ctx.strokeStyle=st.outlineColor; ctx.lineWidth=0.8; ctx.stroke();
        }
        ctx.restore();

      } else if (st.type === 'diamond') {
        // Point features: extract coordinate from WKT POINT or first coord
        const re2 = /([-\d.]+)\s+([-\d.]+)/; const m2 = re2.exec(wkt); if(!m2) return;
        const {x,y} = proj(parseFloat(m2[1]), parseFloat(m2[2]), ext, merc);
        const r = st.size / 2;
        ctx.save();
        ctx.beginPath(); ctx.moveTo(x,y-r); ctx.lineTo(x+r,y); ctx.lineTo(x,y+r); ctx.lineTo(x-r,y); ctx.closePath();
        ctx.fillStyle = st.fill;   ctx.fill();
        ctx.strokeStyle = st.outline; ctx.lineWidth = st.outlineW; ctx.stroke();
        ctx.restore();
      }
    });
  };

  // ── Site boundary ───────────────────────────────────────────
  const drawSite = (ctx, ext, merc) => {
    if(!siteData) return;
    const geom=siteData.geometry||siteData; if(!geom||!geom.coordinates) return;
    const allPolys=geom.type==='Polygon'?[geom.coordinates]:geom.type==='MultiPolygon'?geom.coordinates:[];
    ctx.save(); ctx.strokeStyle='#FF0000'; ctx.lineWidth=2.5; ctx.setLineDash([]);
    allPolys.forEach(poly=>poly.forEach(ring=>{
      ctx.beginPath();
      ring.forEach((c,i)=>{ const p=proj(c[0],c[1],ext,merc); i===0?ctx.moveTo(p.x,p.y):ctx.lineTo(p.x,p.y); });
      ctx.closePath(); ctx.stroke();
    }));
    ctx.restore();
  };

  // ── 1 km buffer from site boundary edge ───────────────────
  // The buffer radius = max distance from centroid to any site boundary vertex
  // + 1 km. This ensures the dashed circle is always 1km from the nearest
  // point on the site boundary, not from the centroid.
  const drawBuffer = (ctx, ext, merc) => {
    if (!centroid) return;
    const BUF_ADD_KM = 1.0; // km added beyond the site boundary

    // Find the furthest boundary vertex from centroid (in km)
    let maxDistKm = 0;
    if (siteData) {
      const geom = siteData.geometry || siteData;
      if (geom && geom.coordinates) {
        const allPolys = geom.type === 'Polygon' ? [geom.coordinates]
          : geom.type === 'MultiPolygon' ? geom.coordinates : [];
        allPolys.forEach(poly => poly[0].forEach(c => {
          const dLat = (c[1] - centroid.lat) * 111320;
          const dLng = (c[0] - centroid.lng) * 111320 * Math.cos(centroid.lat * Math.PI / 180);
          const d = Math.sqrt(dLat*dLat + dLng*dLng) / 1000; // km
          if (d > maxDistKm) maxDistKm = d;
        }));
      }
    }
    const totalRadiusKm = maxDistKm + BUF_ADD_KM;

    // Project radius to canvas pixels
    const cPx = proj(centroid.lng, centroid.lat, ext, merc);
    const ePx = proj(
      centroid.lng + totalRadiusKm / (111.32 * Math.cos(centroid.lat * Math.PI / 180)),
      centroid.lat, ext, merc
    );
    const rPx = Math.abs(ePx.x - cPx.x);

    ctx.save(); ctx.strokeStyle = '#000'; ctx.lineWidth = 1.5; ctx.setLineDash([8, 5]);
    ctx.beginPath(); ctx.arc(cPx.x, cPx.y, rPx, 0, Math.PI * 2); ctx.stroke();
    ctx.setLineDash([]); ctx.restore();
    // Label
    ctx.save(); ctx.fillStyle = '#333'; ctx.font = 'italic 7.5px Arial';
    ctx.textAlign = 'center'; ctx.textBaseline = 'bottom';
    ctx.fillText('1km Buffer', cPx.x, cPx.y - rPx - 3);
    ctx.textBaseline = 'alphabetic'; ctx.restore();
  };

  // ── North arrow (circle style) ──────────────────────────────
  const drawNorth = (ctx, cx, cy, r) => {
    ctx.save(); ctx.translate(cx,cy);
    ctx.beginPath(); ctx.arc(0,0,r,0,Math.PI*2); ctx.strokeStyle='#666'; ctx.lineWidth=0.8; ctx.stroke();
    // filled north half
    ctx.beginPath(); ctx.moveTo(0,-r*0.75); ctx.lineTo(r*0.28,r*0.3); ctx.lineTo(0,r*0.08); ctx.closePath();
    ctx.fillStyle='#333'; ctx.fill();
    // white south half
    ctx.beginPath(); ctx.moveTo(0,-r*0.75); ctx.lineTo(-r*0.28,r*0.3); ctx.lineTo(0,r*0.08); ctx.closePath();
    ctx.fillStyle='#fff'; ctx.fill();
    // outline both halves
    ctx.beginPath(); ctx.moveTo(0,-r*0.75); ctx.lineTo(r*0.28,r*0.3); ctx.lineTo(0,r*0.08); ctx.lineTo(-r*0.28,r*0.3); ctx.closePath();
    ctx.strokeStyle='#555'; ctx.lineWidth=0.5; ctx.stroke();
    ctx.fillStyle='#333'; ctx.font=`bold ${Math.round(r*0.62)}px Arial`; ctx.textAlign='center'; ctx.textBaseline='top';
    ctx.fillText('N',0,r*0.42);
    ctx.restore();
  };

  // ── Scale bar ───────────────────────────────────────────────
  // Format a metre distance as a clean label (no floating point noise)
  const fmtBarLabel = (m) => {
    if (m === 0) return '0';
    if (m >= 1000) {
      const km = m / 1000;
      // Show as integer km if whole, else 1dp
      return (km === Math.floor(km)) ? `${km}km` : `${parseFloat(km.toFixed(1))}km`;
    }
    return `${Math.round(m)}m`;
  };

  const drawScaleBar = (ctx, x, y, barM, pixPerM) => {
    const barPx = Math.round(barM * pixPerM);
    const divs = 2; const divPx = barPx / divs;
    ctx.save();
    // "Meters" label above bar, right-aligned to end
    ctx.font = '7.5px Arial'; ctx.fillStyle = '#555'; ctx.textAlign = 'right';
    ctx.fillText('Meters', x + barPx, y - 3);
    // Two alternating segments
    for (let i = 0; i < divs; i++) {
      ctx.fillStyle = i % 2 === 0 ? '#444' : '#fff';
      ctx.fillRect(x + i * divPx, y, divPx, 5);
    }
    ctx.strokeStyle = '#444'; ctx.lineWidth = 0.6; ctx.strokeRect(x, y, barPx, 5);
    // Tick labels: 0, midpoint, full — using clean formatter
    ctx.fillStyle = '#333'; ctx.font = '7.5px Arial'; ctx.textAlign = 'center';
    ctx.fillText(fmtBarLabel(0),      x,            y + 13);
    ctx.fillText(fmtBarLabel(barM/2), x + barPx/2,  y + 13);
    ctx.fillText(fmtBarLabel(barM),   x + barPx,    y + 13);
    ctx.restore();
  };

  // ── Legend swatch ───────────────────────────────────────────
  const drawSwatch = (ctx, style, x, y, w=24, h=13) => {
    ctx.save();
    if(style.type==='fill'){
      const rgb=hexToRgb(style.color);
      ctx.fillStyle=`rgba(${rgb.r},${rgb.g},${rgb.b},${style.alpha})`;
      ctx.fillRect(x,y,w,h);
    } else if(style.type==='hatch'){
      ctx.save(); ctx.beginPath(); ctx.rect(x,y,w,h); ctx.clip();
      ctx.strokeStyle=style.fill; ctx.lineWidth=Math.min(style.hatchW,2)*0.6;
      const a=style.angle*Math.PI/180;
      for(let d=-w*2;d<w*2;d+=style.sep*0.55){
        ctx.beginPath();
        ctx.moveTo(x+w/2+d*Math.cos(a+Math.PI/2)-w*Math.cos(a),y+h/2+d*Math.sin(a+Math.PI/2)-w*Math.sin(a));
        ctx.lineTo(x+w/2+d*Math.cos(a+Math.PI/2)+w*Math.cos(a),y+h/2+d*Math.sin(a+Math.PI/2)+w*Math.sin(a));
        ctx.stroke();
      }
      ctx.restore();
      if(style.outline){ctx.strokeStyle=style.outline;ctx.lineWidth=style.outlineW||1;ctx.strokeRect(x,y,w,h);}
    } else if(style.type==='dots'){
      ctx.save(); ctx.beginPath(); ctx.rect(x,y,w,h); ctx.clip();
      [[0.2,0.5],[0.55,0.25],[0.8,0.72]].forEach(([fx,fy])=>{
        ctx.beginPath(); ctx.arc(x+fx*w,y+fy*h,style.dotSize*0.55,0,Math.PI*2);
        ctx.fillStyle=style.dotColor; ctx.fill();
        ctx.strokeStyle=style.outlineColor; ctx.lineWidth=0.7; ctx.stroke();
      });
      ctx.restore();
    } else if(style.type==='diamond'){
      const cx=x+w/2,cy=y+h/2,r=Math.min(w,h)*0.38;
      ctx.beginPath();ctx.moveTo(cx,cy-r);ctx.lineTo(cx+r,cy);ctx.lineTo(cx,cy+r);ctx.lineTo(cx-r,cy);ctx.closePath();
      ctx.fillStyle=style.fill;ctx.fill();ctx.strokeStyle=style.outline;ctx.lineWidth=0.8;ctx.stroke();
    } else if(style.type==='line'){
      ctx.strokeStyle=style.color; ctx.lineWidth=Math.min(style.width,2.5);
      if(style.dash) ctx.setLineDash(style.dash.map(d=>d*0.5));
      ctx.beginPath();ctx.moveTo(x+2,y+h/2);ctx.lineTo(x+w-2,y+h/2);ctx.stroke();
      ctx.setLineDash([]);
    }
    ctx.strokeStyle='#ccc'; ctx.lineWidth=0.4; ctx.strokeRect(x,y,w,h);
    ctx.restore();
  };

  // ── Geometry visibility check ───────────────────────────────
  // Check if any item's geometry has a vertex within the map extent.
  // Items may be plain WKT strings or {wkt, grade} objects (listed buildings).
  const geomVisibleInExtent = (items, ext) => {
    if (!items || !items.length) return false;
    const pad  = 0.12;
    const mnLat = ext.minLat - (ext.maxLat - ext.minLat) * pad;
    const mxLat = ext.maxLat + (ext.maxLat - ext.minLat) * pad;
    const mnLng = ext.minLng - (ext.maxLng - ext.minLng) * pad;
    const mxLng = ext.maxLng + (ext.maxLng - ext.minLng) * pad;
    for (const item of items) {
      const wkt = (typeof item === 'string') ? item : item?.wkt;
      if (!wkt) continue;
      const re = /([-\d.]+)\s+([-\d.]+)/g; let m;
      while ((m = re.exec(wkt)) !== null) {
        const lng = parseFloat(m[1]), lat = parseFloat(m[2]);
        if (lng >= mnLng && lng <= mxLng && lat >= mnLat && lat <= mxLat) return true;
      }
    }
    return false;
  };

  // ── Info block (legend + right panel) ──────────────────────
  const drawInfoBlock = (ctx, presentIds, monthYear, scale, barM, pixPerM) => {
    const BL=ML, BR=MR, BT=INFO_T, BB=INFO_B;
    const BW=BR-BL, BH=BB-BT;

    // Outer info block border (continuation of map box)
    ctx.strokeStyle='#888'; ctx.lineWidth=0.7;
    ctx.strokeRect(BL,BT,BW,BH);

    // Vertical divider: left 57% legend, right 43% panel
    const SPLIT=Math.round(BL+BW*0.57);
    ctx.strokeStyle='#bbb'; ctx.lineWidth=0.5;
    ctx.beginPath(); ctx.moveTo(SPLIT,BT); ctx.lineTo(SPLIT,BB); ctx.stroke();

    // ── LEFT: Legend ──────────────────────────────────────────
    const EXCLUDED = new Set(['green-belt','agricultural-land-class']);
    // Build legend items — expand listed-building into per-grade rows when grades present
    const baseLegendItems = [
      {style:{type:'line',color:'#FF0000',width:2.5},         label:'Site Boundary'},
      {style:{type:'line',color:'#000',width:1.5,dash:[8,5]}, label:'1km Buffer'},
      // Flood zones: always shown in legend — loaded from EA WMS regardless of layerGeoms
      {style:{type:'fill',color:'#b8d4f0',alpha:0.6},         label:'Flood Zone 2 (River & Sea)'},
      {style:{type:'fill',color:'#5b9bd5',alpha:0.6},         label:'Flood Zone 3 (River & Sea)'},
    ];
    const designationItems = [];
    presentIds.filter(id => GIS_STYLES[id] && !EXCLUDED.has(id)).forEach(id => {
      if (id === 'listed-building') {
        // Check which grades are actually present in the geometry data
        const items = layerGeoms[id] || [];
        const grades = [...new Set(items.map(it => (typeof it === 'object' ? it.grade : '')).filter(Boolean))];
        if (grades.length > 0) {
          // Show one row per grade
          ['I','II*','II'].forEach(g => {
            if (grades.includes(g)) {
              const sk = 'listed-building-' + g;
              designationItems.push({ style: GIS_STYLES[sk] || GIS_STYLES['listed-building'], label: GIS_LABELS[sk] || ('Listed Building – Grade ' + g) });
            }
          });
          // Add ungraded row if some entries have no grade
          if (grades.includes('') || items.some(it => !(typeof it === 'object' ? it.grade : ''))) {
            designationItems.push({ style: GIS_STYLES['listed-building'], label: 'Listed Building (ungraded)' });
          }
        } else {
          designationItems.push({ style: GIS_STYLES[id], label: GIS_LABELS[id] || id });
        }
      } else {
        designationItems.push({ style: GIS_STYLES[id], label: GIS_LABELS[id] || id });
      }
    });
    const legendItems = [...baseLegendItems, ...designationItems];
    const swW=22,swH=11,rowH=15,PAD_L=6;
    const colW=Math.floor((SPLIT-BL-PAD_L*2)/2);
    const maxRows=Math.floor((BH-8)/rowH);
    let col=0,row=0;
    ctx.save(); ctx.font='7.5px Arial'; ctx.textBaseline='middle';
    legendItems.forEach(({style,label})=>{
      if(col>=2) return;
      const lx=BL+PAD_L+col*colW;
      const ly=BT+5+row*rowH;
      drawSwatch(ctx,style,lx,ly,swW,swH);
      const maxW=colW-swW-6;
      let txt=label;
      while(ctx.measureText(txt).width>maxW&&txt.length>4) txt=txt.slice(0,-1);
      if(txt!==label) txt=txt.slice(0,-1)+'…';
      ctx.fillStyle='#1a1a1a'; ctx.textAlign='left';
      ctx.fillText(txt,lx+swW+4,ly+swH/2);
      row++;
      if(row>=maxRows){row=0;col++;}
    });
    ctx.textBaseline='alphabetic'; ctx.restore();

    // ── RIGHT: rows with dividers ─────────────────────────────
    const RP=SPLIT+8, RW=BR-SPLIT-8;

    // Row heights: distribute BH into 3 sections
    const R1H=Math.round(BH*0.38); // scale bar + north
    const R2H=Math.round(BH*0.18); // date row
    const R3H=Math.round(BH*0.18); // scale text
    const R4H=BH-R1H-R2H-R3H;     // logo (remainder)

    const r1T=BT, r2T=BT+R1H, r3T=BT+R1H+R2H, r4T=BT+R1H+R2H+R3H;

    // Horizontal dividers
    [r2T,r3T,r4T].forEach(y=>{
      ctx.strokeStyle='#bbb'; ctx.lineWidth=0.5;
      ctx.beginPath(); ctx.moveTo(SPLIT,y); ctx.lineTo(BR,y); ctx.stroke();
    });

    // Row 1: Scale bar (left) + North arrow (right)
    const sbY=r1T+Math.round(R1H*0.42);
    const sbMaxW=Math.round(RW*0.6);
    // Constrain barM so scale bar fits
    const actualBarPx=Math.min(barM*pixPerM, sbMaxW);
    const displayBarM=Math.round(actualBarPx/pixPerM/10)*10||barM;
    drawScaleBar(ctx,RP,sbY,displayBarM,pixPerM);
    const naR=Math.round(R1H*0.28);
    drawNorth(ctx, BR-naR-7, r1T+Math.round(R1H*0.52), naR);

    // Row 2: Month YYYY | Created by: Quod
    const r2mid=r2T+Math.round(R2H/2)+3;
    ctx.save(); ctx.font='8.5px Arial'; ctx.fillStyle='#222'; ctx.textBaseline='middle';
    ctx.textAlign='left';  ctx.fillText(monthYear,RP,r2mid);
    ctx.textAlign='right'; ctx.fillText('Created by: Quod',BR-7,r2mid);
    ctx.textBaseline='alphabetic'; ctx.restore();

    // Row 3: Scale text | Source
    const r3mid=r3T+Math.round(R3H/2)+3;
    ctx.save(); ctx.font='8.5px Arial'; ctx.fillStyle='#222'; ctx.textBaseline='middle';
    ctx.textAlign='left';  ctx.fillText(`Scale: 1:${scale.toLocaleString()} @ A4`,RP,r3mid);
    ctx.textAlign='right'; ctx.font='7px Arial'; ctx.fillStyle='#888';
    ctx.fillText('planning.data.gov.uk',BR-7,r3mid);
    ctx.textBaseline='alphabetic'; ctx.restore();

    // Row 4: Logo box — divided into TOP (logo mark + Quod name) and BOTTOM (address)
    const logoBoxW = Math.min(Math.round(RW * 0.88), 160);
    const logoBoxH = R4H - 4;
    const lbL = BR - logoBoxW - 3, lbT = r4T + 2;
    ctx.save();
    ctx.strokeStyle = '#ccc'; ctx.lineWidth = 0.6; ctx.strokeRect(lbL, lbT, logoBoxW, logoBoxH);

    // Split box: top 48% = logo mark + "Quod", bottom 52% = address lines
    const topH    = Math.round(logoBoxH * 0.48);
    const bottomT = lbT + topH;
    const bottomH = logoBoxH - topH;

    // Thin divider between top and bottom zones
    ctx.strokeStyle = '#e8e8e8'; ctx.lineWidth = 0.5;
    ctx.beginPath(); ctx.moveTo(lbL + 2, bottomT); ctx.lineTo(lbL + logoBoxW - 2, bottomT); ctx.stroke();

    // TOP ZONE: circular logo mark (left) + "Quod" bold (right of mark)
    const mkR  = Math.round(Math.min(topH * 0.38, 14));
    const mkCX = lbL + mkR + 7;
    const mkCY = lbT + Math.round(topH / 2);
    // Outer circle (navy)
    ctx.beginPath(); ctx.arc(mkCX, mkCY, mkR, 0, Math.PI * 2);
    ctx.fillStyle = '#143550'; ctx.fill();
    // Inner white circle (Q cutout)
    ctx.beginPath(); ctx.arc(mkCX + mkR * 0.25, mkCY - mkR * 0.22, mkR * 0.52, 0, Math.PI * 2);
    ctx.fillStyle = '#fff'; ctx.fill();
    // "Quod" text — vertically centred in top zone, to the right of the circle
    const nameSize = Math.min(Math.round(topH * 0.38), 13);
    ctx.fillStyle = '#143550'; ctx.font = `bold ${nameSize}px Arial`;
    ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
    ctx.fillText('Quod', mkCX + mkR + 7, mkCY);

    // BOTTOM ZONE: address lines — 3 lines fitting within logoBoxW
    const addrMaxW = logoBoxW - 10;
    const addrX    = lbL + 5;
    const lineH    = Math.round(bottomH / 3.4);
    ctx.fillStyle = '#555'; ctx.font = '6px Arial';
    ctx.textAlign = 'left'; ctx.textBaseline = 'top';
    const fitText = (t, x, y) => {
      let s = t;
      while (ctx.measureText(s).width > addrMaxW && s.length > 3) s = s.slice(0, -1);
      if (s !== t) s = s.slice(0, -1) + '…';
      ctx.fillText(s, x, y);
    };
    const addrTop = bottomT + Math.round(bottomH * 0.08);
    fitText('21 Soho Square, London W1D 3QP', addrX, addrTop);
    fitText('020 7297 1000', addrX, addrTop + lineH);
    fitText('www.quod.com', addrX, addrTop + lineH * 2);
    ctx.restore();

    // ── Title bar (spans full width below everything) ─────────
    ctx.save();
    ctx.font = 'bold 10px Arial'; ctx.fillStyle = '#143550';
    ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
    const titleY = BB + Math.round((INFO_B + BORDER + PAD - BB) / 2);
    ctx.fillText('Environmental Sensitivities Plan', BL + 6, titleY);
    // Credit line — right-aligned in title bar
    ctx.font = '7px Arial'; ctx.fillStyle = '#888';
    ctx.textAlign = 'right';
    ctx.fillText('Tool designed by Lucas and Alex', BR - 6, titleY);
    ctx.restore();
  };

  // ── Basemap tile loading (ESRI Light Gray Canvas) ───────────
  // ESRI World Light Gray Canvas is natively greyscale. We draw tiles directly
  // via drawImage() — NO getImageData() call, so no canvas CORS taint.
  // Tiles are drawn INSIDE the clipping region so they cannot overflow the map box.
  // Tile URL format: /tile/{z}/{y}/{x}  (ESRI: y before x)
  // ── EA Flood Zone WMS loader ────────────────────────────────
  // Draws EA Flood Map for Planning flood zones onto the canvas using WMS.
  // Two requests with SLD_BODY to separately colour FZ2 and FZ3 per style guide.
  // No crossOrigin attribute → no CORS preflight → no canvas-taint concern
  // since we never call getImageData() after drawing.
  // Both zones drawn at 60% transparency (globalAlpha=0.6).
  // WMS endpoint: geoservices/datasets/04532375.../wms
  // Layer: Flood_Zones_2_3_Rivers_and_Sea
  // WMS 1.3.0, EPSG:4326 bbox axis order: minLat,minLng,maxLat,maxLng
  // ── EA Flood Zone WMS loader ────────────────────────────────
  // Robust implementation with:
  //  • Parallel FZ2+FZ3 requests (faster than sequential)
  //  • Automatic retry with exponential backoff (up to 3 attempts)
  //  • Three-tier fallback: styled FZ2+FZ3 → combined unstyled → silent fail
  //  • Cache-busting timestamp prevents stale blank PNG being reused
  //  • Blank image detection: WMS silently returns transparent PNG on failure;
  //    we sample pixels to detect this and trigger fallback instead
  //  • onStatus callback updates UI indicator
  //
  // Data updates automatically — fetched live from EA servers on every render.
  // No code change needed when EA updates flood zone extents.
  const loadFloodZoneWMS = async (ctx, ext, onStatus) => {
    const WMS = 'https://environment.data.gov.uk/geoservices/datasets/04532375-a198-476e-985e-0579a0a11b47/wms';
    const LYR = 'Flood_Zones_2_3_Rivers_and_Sea';
    const bbox = `${ext.minLat.toFixed(6)},${ext.minLng.toFixed(6)},${ext.maxLat.toFixed(6)},${ext.maxLng.toFixed(6)}`;
    const bust = Date.now();
    const base = { SERVICE:'WMS', VERSION:'1.3.0', REQUEST:'GetMap',
      LAYERS:LYR, BBOX:bbox, CRS:'EPSG:4326',
      WIDTH:String(MW), HEIGHT:String(MH),
      FORMAT:'image/png', TRANSPARENT:'true', STYLES:'', _cb:String(bust) };

    // Build SLD XML string without raw < > to prevent Babel JSX parser confusion.
    // Uses \u003C (less-than) and \u003E (greater-than) unicode escapes.
    const LT = '\u003C', GT = '\u003E';
    const mkSLD = (zone, colour) => [
      LT+'StyledLayerDescriptor version="1.0.0" xmlns="http://www.opengis.net/sld"',
      ' xmlns:ogc="http://www.opengis.net/ogc"'+GT,
      LT+'NamedLayer'+GT+LT+'Name'+GT+LYR+LT+'/Name'+GT+LT+'UserStyle'+GT,
      LT+'FeatureTypeStyle'+GT+LT+'Rule'+GT,
      LT+'ogc:Filter'+GT,
      LT+'ogc:PropertyIsEqualTo'+GT,
      LT+'ogc:PropertyName'+GT+'layer_type'+LT+'/ogc:PropertyName'+GT,
      LT+'ogc:Literal'+GT+zone+LT+'/ogc:Literal'+GT,
      LT+'/ogc:PropertyIsEqualTo'+GT+LT+'/ogc:Filter'+GT,
      LT+'PolygonSymbolizer'+GT+LT+'Fill'+GT,
      LT+'CssParameter name="fill"'+GT+colour+LT+'/CssParameter'+GT,
      LT+'CssParameter name="fill-opacity"'+GT+'1'+LT+'/CssParameter'+GT,
      LT+'/Fill'+GT+LT+'/PolygonSymbolizer'+GT,
      LT+'/Rule'+GT+LT+'/FeatureTypeStyle'+GT+LT+'/UserStyle'+GT,
      LT+'/NamedLayer'+GT+LT+'/StyledLayerDescriptor'+GT,
    ].join('');

    const makeUrl = (extra) => `${WMS}?${new URLSearchParams({...base,...extra}).toString()}`;

    // Detect blank/transparent PNG — WMS returns valid transparent PNG on failure.
    // We sample a tiny section from the image centre to check for any non-transparent pixels.
    const isBlank = (img) => {
      try {
        const tmp = document.createElement('canvas'); tmp.width=4; tmp.height=4;
        const tc = tmp.getContext('2d');
        tc.drawImage(img, Math.max(0,img.width/2-2), Math.max(0,img.height/2-2), 4, 4, 0, 0, 4, 4);
        const d = tc.getImageData(0,0,4,4).data;
        for (let i=3; i<d.length; i+=4) if (d[i]>10) return false;
        return true;
      } catch(e) { return false; } // tainted canvas = assume not blank
    };

    // Load image with timeout; detect blank.
    const tryLoad = (url, ms=12000) => new Promise(res => {
      const img = new Image();
      const t = setTimeout(() => { img.src=''; res(null); }, ms);
      img.onload  = () => { clearTimeout(t); res(isBlank(img) ? null : img); };
      img.onerror = () => { clearTimeout(t); res(null); };
      img.src = url;
    });

    // Retry up to 3 times with exponential backoff (500ms, 1000ms, 2000ms)
    const loadRetry = async (url, attempts=3) => {
      for (let i=0; i<attempts; i++) {
        if (i>0) await new Promise(r=>setTimeout(r, 500*Math.pow(2,i-1)));
        const img = await tryLoad(url, 10000+i*3000);
        if (img) return img;
      }
      return null;
    };

    const draw = (img, alpha) => {
      if (!img) return;
      ctx.save(); ctx.globalAlpha=alpha;
      ctx.drawImage(img, ML, MT, MW, MH);
      ctx.globalAlpha=1; ctx.restore();
    };

    onStatus && onStatus('loading');

    // Tier 1: Parallel styled requests — FZ2 light blue, FZ3 darker blue
    const [imgFZ2, imgFZ3] = await Promise.all([
      loadRetry(makeUrl({SLD_BODY: mkSLD('Flood Zone 2','#b8d4f0')})),
      loadRetry(makeUrl({SLD_BODY: mkSLD('Flood Zone 3','#5b9bd5')})),
    ]);
    if (imgFZ2 || imgFZ3) {
      draw(imgFZ2, 0.6); // FZ2 first (lighter, underneath)
      draw(imgFZ3, 0.6); // FZ3 on top (darker)
      onStatus && onStatus('styled');
      return;
    }

    // Tier 2: Combined single request, EA default styling
    console.warn('[FloodWMS] Styled requests returned blank — trying unstyled fallback');
    const imgAll = await loadRetry(makeUrl({}));
    if (imgAll) {
      draw(imgAll, 0.55);
      onStatus && onStatus('fallback');
      return;
    }

    // Tier 3: All failed
    console.warn('[FloodWMS] All attempts failed — flood zones unavailable this render');
    onStatus && onStatus('failed');
  };

  };

    const loadBasemap = async (ctx, ext, merc) => {
    const lat2t=(lat,z)=>Math.floor((1-Math.log(Math.tan(lat*Math.PI/180)+1/Math.cos(lat*Math.PI/180))/Math.PI)/2*Math.pow(2,z));
    const lng2t=(lng,z)=>Math.floor((lng+180)/360*Math.pow(2,z));
    // Use Mercator-correct tile-edge projection
    const tileProj=(txFrac,tyFrac,z)=>{
      const lng=txFrac/Math.pow(2,z)*360-180;
      const n=Math.PI-2*Math.PI*tyFrac/Math.pow(2,z);
      const lat=Math.atan(Math.sinh(n))*180/Math.PI;
      return proj(lng,lat,ext,merc);
    };
    // Correct zoom: tiles should be ~256–400px on canvas
    const lngRange=ext.maxLng-ext.minLng;
    const zIdeal=Math.log2(MW*360/(256*lngRange));
    const z=Math.max(10,Math.min(16,Math.round(zIdeal)));
    const txMin=lng2t(ext.minLng,z), txMax=lng2t(ext.maxLng,z);
    const tyMin=lat2t(ext.maxLat,z), tyMax=lat2t(ext.minLat,z);
    const ESRI=(z,y,x)=>`https://server.arcgisonline.com/ArcGIS/rest/services/Canvas/World_Light_Gray_Canvas/MapServer/tile/${z}/${y}/${x}`;
    const CARTO=(z,x,y)=>`https://cartodb-basemaps-a.global.ssl.fastly.net/light_all/${z}/${x}/${y}.png`;
    const jobs=[];
    for(let tx=txMin;tx<=txMax;tx++) for(let ty=tyMin;ty<=tyMax;ty++){
      jobs.push(new Promise(res=>{
        // Pixel corners using Mercator-correct tileProj
        const p0=tileProj(tx,ty,z), p1=tileProj(tx+1,ty+1,z);
        const dw=p1.x-p0.x, dh=p1.y-p0.y;
        if(Math.abs(dw)<0.5||Math.abs(dh)<0.5){res();return;}
        const tryLoad=(url,fallback)=>{
          const img=new Image(); img.crossOrigin='anonymous';
          img.onload=()=>{ try{ctx.drawImage(img,p0.x,p0.y,dw,dh);}catch(e){} res(); };
          img.onerror=()=>fallback?fallback():res();
          setTimeout(res,8000); img.src=url;
        };
        tryLoad(ESRI(z,ty,tx),()=>tryLoad(CARTO(z,tx,ty),()=>res()));
      }));
    }
    await Promise.all(jobs);
  };

  // ── Main render ─────────────────────────────────────────────
  const renderToCanvas = async (ctx, withTiles) => {
    const ext=getExtent(); if(!ext) return null;
    const merc=extMercY(ext);
    const {scale,barM,pixPerM}=calcScale(ext);

    // 1. Page background
    ctx.fillStyle='#e8e8e8'; ctx.fillRect(0,0,W,H);

    // 2. White fill for map area
    ctx.fillStyle='#fff'; ctx.fillRect(ML,MT,MW,MH);

    // 3. CLIP to map box — everything below is confined within borders
    ctx.save();
    ctx.beginPath(); ctx.rect(ML,MT,MW,MH); ctx.clip();

    // 4. Basemap (drawn inside clip — cannot overflow map box)
    if(withTiles){
      ctx.fillStyle='#f5f3f0'; ctx.fillRect(ML,MT,MW,MH); // base colour while tiles load
      try{ await loadBasemap(ctx,ext,merc); } catch(e){}
    } else {
      // PDF: clean neutral grey matching ESRI palette (no tiles due to CORS)
      ctx.fillStyle='#f0ede8'; ctx.fillRect(ML,MT,MW,MH);
      ctx.strokeStyle='#e0ddd8'; ctx.lineWidth=0.4;
      const step=Math.max(MW/20,15);
      for(let gx=ML;gx<=MR;gx+=step){ctx.beginPath();ctx.moveTo(gx,MT);ctx.lineTo(gx,MB);ctx.stroke();}
      for(let gy=MT;gy<=MB;gy+=step){ctx.beginPath();ctx.moveTo(ML,gy);ctx.lineTo(MR,gy);ctx.stroke();}
    }

    // 5. Designation layers — explicit draw order (bottom to top):
    const SKIP = new Set(['green-belt','agricultural-land-class']);

    // 5a. Flood zones via EA WMS (bottom of draw order, above basemap only)
    // FZ2 light blue, FZ3 darker blue, both at 60% transparency.
    // Robust: 3-attempt retry with backoff, blank-image detection, 3-tier fallback.
    // Only in preview — PDF cannot load cross-origin images.
    if (withTiles) {
      try {
        await loadFloodZoneWMS(ctx, ext, (status) => {
          if (status === 'loading') setFloodStatus('loading');
          else if (status === 'styled' || status === 'fallback') setFloodStatus('ok');
          else if (status === 'failed') setFloodStatus('failed');
        });
      } catch(e) {
        console.warn('[FloodWMS] error:', e);
        setFloodStatus('failed');
      }
    }

    // 5b. Background fills (SAC, WHS, conservation areas, NNR, LNR)
    const FILL_LAYERS = ['sac','whs','conservation-area','national-nature-reserve','local-nature-reserve'];
    FILL_LAYERS.forEach(id => {
      const items = layerGeoms[id]; if(!items||!items.length) return;
      drawLayerGeoms(ctx, id, items, ext, merc);
    });

    // 5c. Hatch patterns (SSSI, AONB, NP, Ramsar, AQMA, RPG)
    ALL_LAYER_IDS.forEach(id => {
      if(SKIP.has(id)) return;
      if(['flood-zone-2','flood-zone-3',...FILL_LAYERS,'scheduled-monument','listed-building'].includes(id)) return;
      const items = layerGeoms[id]; if(!items||!items.length) return;
      if((GIS_STYLES[id]||{}).type === 'hatch') drawLayerGeoms(ctx, id, items, ext, merc);
    });

    // 5d. Dot patterns (SPA, Ancient Woodland, LWS)
    ALL_LAYER_IDS.forEach(id => {
      if(SKIP.has(id)) return;
      const items = layerGeoms[id]; if(!items||!items.length) return;
      if((GIS_STYLES[id]||{}).type === 'dots') drawLayerGeoms(ctx, id, items, ext, merc);
    });

    // 5e. Scheduled Monument — near front (behind site boundary + buffer only)
    {const items = layerGeoms['scheduled-monument']; if(items&&items.length) drawLayerGeoms(ctx,'scheduled-monument',items,ext,merc);}

    // 5f. Listed Buildings — diamonds on top of area fills
    {const items = layerGeoms['listed-building']; if(items&&items.length) drawLayerGeoms(ctx,'listed-building',items,ext,merc);}

    // 6. 1km buffer (inside clip, above all designations)
    drawBuffer(ctx,ext,merc);

    // 7. Site boundary — always on top (inside clip)
    drawSite(ctx,ext,merc);

    // Release clip
    ctx.restore();

    // 8. Map box border (drawn after restore so it's crisp on top)
    ctx.strokeStyle='#555'; ctx.lineWidth=1.2;
    ctx.strokeRect(ML,MT,MW,MH);

    // 9. Info block
    const now=new Date();
    const monthYear=now.toLocaleDateString('en-GB',{month:'long',year:'numeric'});
    const presentIds=ALL_LAYER_IDS.filter(id=>{
      if(!layerGeoms[id]||!layerGeoms[id].length) return false;
      // Flood zones are rendered via EA WMS — exclude from layerGeoms legend
      if(id==='flood-zone-2'||id==='flood-zone-3') return false;
      if(id==='green-belt'||id==='agricultural-land-class') return false;
      return geomVisibleInExtent(layerGeoms[id],ext);
    });
    drawInfoBlock(ctx,presentIds,monthYear,scale,barM,pixPerM);

    // 10. Outer page border
    ctx.strokeStyle='#555'; ctx.lineWidth=1.0;
    ctx.strokeRect(BORDER,BORDER,W-BORDER*2,H-BORDER*2);

    return {scale,barM};
  };

  // ── Effects ─────────────────────────────────────────────────
  useEffect(()=>{
    setRendering(true);
    setFloodStatus('idle');
    const canvas=canvasRef.current; if(!canvas) return;
    const ctx=canvas.getContext('2d');
    renderToCanvas(ctx,true).then(info=>{
      if(info) setMapInfoText(`1:${info.scale.toLocaleString()}`);
      setRendering(false);
    });
  },[siteData,layerGeoms,centroid,mapRadiusKm]);

  const downloadPDF=()=>{
    const {jsPDF}=window.jspdf;
    const off=document.createElement('canvas'); off.width=W; off.height=H;
    renderToCanvas(off.getContext('2d'),false).then(()=>{
      const pdf=new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
      pdf.addImage(off.toDataURL('image/png',1.0),'PNG',0,0,210,297);
      const d=new Date();
      pdf.save(`Environmental_Sensitivities_Plan_${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}.pdf`);
    });
  };

  // ── Render ───────────────────────────────────────────────────
  return (
    <div>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:8}}>
        <span style={{fontSize:11,color:C.muted,fontFamily:F,display:'flex',alignItems:'center',gap:8}}>
          {rendering ? 'Rendering map…' : `Scale 1:${mapInfoText} · 1km buffer · ESRI basemap`}
          {!rendering && (
            <span style={{
              fontSize:10, fontWeight:600, padding:'1px 7px', borderRadius:3,
              background: floodStatus==='ok'      ? '#dbeafe'
                        : floodStatus==='loading' ? '#fef9c3'
                        : floodStatus==='failed'  ? '#fee2e2'
                        : '#f3f4f6',
              color:      floodStatus==='ok'      ? '#1d4ed8'
                        : floodStatus==='loading' ? '#92400e'
                        : floodStatus==='failed'  ? '#991b1b'
                        : '#6b7280',
            }}>
              {floodStatus==='ok'      ? '✓ Flood zones loaded'
             : floodStatus==='loading' ? '⟳ Loading flood zones…'
             : floodStatus==='failed'  ? '⚠ Flood zones unavailable — EA server unreachable'
             : 'Flood zones: pending'}
            </span>
          )}
        </span>
        <button onClick={downloadPDF} disabled={rendering} style={{
          background:rendering?C.light:'#143550',color:rendering?C.muted:'#fff',
          border:'none',borderRadius:5,padding:'7px 16px',cursor:rendering?'default':'pointer',
          fontFamily:F,fontWeight:700,fontSize:12,opacity:rendering?0.6:1,
          display:'flex',alignItems:'center',gap:6,transition:'all 0.15s'
        }}>
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
            <polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
          </svg>
          Download PDF
        </button>
      </div>
      <div style={{position:'relative',background:'#ddd',borderRadius:4,overflow:'hidden',display:'flex',justifyContent:'center',padding:6,boxShadow:'inset 0 1px 4px rgba(0,0,0,0.15)'}}>
        {rendering&&(
          <div style={{position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center',background:'rgba(255,255,255,0.75)',zIndex:2,borderRadius:4}}>
            <div style={{textAlign:'center'}}>
              <div style={{width:28,height:28,border:`3px solid ${C.border}`,borderTopColor:C.teal,borderRadius:'50%',animation:'spin .8s linear infinite',margin:'0 auto 8px'}}/>
              <div style={{fontSize:12,color:C.slate,fontFamily:F}}>Generating map…</div>
            </div>
          </div>
        )}
        <canvas ref={canvasRef} width={W} height={H}
          style={{maxWidth:'100%',height:'auto',display:'block',boxShadow:'0 2px 12px rgba(0,0,0,0.18)'}}/>
      </div>
      <div style={{fontSize:10,color:C.faint,marginTop:5,textAlign:'right',fontFamily:F}}>
        v20260319-1627 · Flood Zones © Environment Agency 2025 · Basemap © Esri · Designations © Natural England / planning.data.gov.uk · Quod EP
      </div>
    </div>
  </div>
  );
}


/* ── Help page ───────────────────────────────────────────── */
function HelpPage({onBack}) {
  const h2={fontSize:15,fontWeight:700,color:C.navy,marginBottom:9,paddingBottom:7,borderBottom:`1px solid ${C.borderLt}`};
  const p={fontSize:13,color:C.slate,lineHeight:1.7,marginBottom:8};
  const li={fontSize:13,color:C.slate,lineHeight:1.7,marginBottom:4};
  return(
    <div style={{fontFamily:F,background:C.off,minHeight:'100vh'}}>
      <div style={{background:C.navy,padding:'0 22px',height:50,display:'flex',alignItems:'center',gap:12}}>
        <button onClick={onBack} style={{background:'transparent',border:'1px solid rgba(255,255,255,0.25)',color:'rgba(255,255,255,0.7)',borderRadius:5,padding:'4px 11px',cursor:'pointer',fontSize:12,fontFamily:F}}>← Back</button>
        <span style={{fontSize:14,fontWeight:700,color:C.white}}>Methodology &amp; Help</span>
      </div>
      <div style={{maxWidth:780,margin:'0 auto',padding:'30px 22px 80px'}}>
        <div style={{background:C.white,border:`1px solid ${C.border}`,borderRadius:8,padding:'24px 26px'}}>

          <div style={{marginBottom:26}}><div style={h2}>About this tool</div>
            <div style={p}>This tool provides preliminary EIA screening guidance under the Town and Country Planning (Environmental Impact Assessment) Regulations 2017. It assesses whether a Schedule 2 development is likely to require a formal EIA Screening Opinion under Regulation 7.</div>
            <div style={p}>The output is indicative only. A formal Screening Opinion from the Local Planning Authority should always be sought for complex proposals or those near sensitive receptors.</div>
          </div>

          <div style={{marginBottom:26}}><div style={h2}>Scoring methodology — 50/50 split</div>
            <div style={p}>The total score (0–100) is divided equally:</div>
            <ul style={{paddingLeft:20,marginBottom:8}}>
              <li style={li}><strong>Threshold score (0–50):</strong> Based on Schedule 2 development-specific answers, normalised per question and averaged across all selected uses.</li>
              <li style={li}><strong>Environmental sensitivity score (0–50):</strong> Combines Regulation 2(1) proximity scores (distance-weighted, searched to 10 km) with additional designation scores (binary, within user search radius).</li>
            </ul>
            <div style={p}>Score ≥70 = Screening likely required. Score 45–69 = Consider screening. Score &lt;45 = Lower risk. If any Reg 2(1) feature intersects the site, screening is always required.</div>
          </div>

          <div style={{marginBottom:26}}><div style={h2}>Regulation 2(1) proximity weighting</div>
            <table style={{width:'100%',borderCollapse:'collapse',fontSize:12,marginBottom:8}}>
              <thead><tr style={{background:C.navy}}>
                <th style={{padding:'7px 12px',textAlign:'left',color:C.white,fontWeight:700}}>Distance band</th>
                <th style={{padding:'7px 12px',textAlign:'left',color:C.white,fontWeight:700}}>Score multiplier</th>
                <th style={{padding:'7px 12px',textAlign:'left',color:C.white,fontWeight:700}}>Indicative risk</th>
              </tr></thead>
              <tbody>
                {[['On site (intersects)','100%','Screening required'],['< 500 m','90%','Very high risk'],['500 m – 1 km','80%','High risk'],['1 – 3 km','55%','Significant risk'],['3 – 5 km','35%','Moderate risk'],['5 – 10 km','15%','Low — flagged only'],['> 10 km','0%','Not scored']].map(([d,m,r],i)=>(
                  <tr key={i} style={{background:i%2===0?C.off:C.white,borderBottom:`1px solid ${C.borderLt}`}}>
                    <td style={{padding:'6px 12px',color:C.ink}}>{d}</td>
                    <td style={{padding:'6px 12px',color:C.navy,fontWeight:700}}>{m}</td>
                    <td style={{padding:'6px 12px',color:C.slate}}>{r}</td>
                  </tr>
                ))}
              </tbody>
            </table>
            <div style={p}>A single SSSI within 500 m contributes ~11 points to the environmental score — enough to place most medium-threshold proposals in the "Consider Screening" band.</div>
          </div>

          <div style={{marginBottom:26}}><div style={h2}>Search radius</div>
            <div style={p}>The search radius slider (Step 1) controls how far the tool searches for additional designations (Conservation Areas, Scheduled Monuments, Ancient Woodland, Green Belt, AQMA). Regulation 2(1) sensitive areas are always searched to 10 km regardless of this setting.</div>
          </div>

          <div style={{marginBottom:26}}><div style={h2}>Data sources</div>
            <ul style={{paddingLeft:20}}>
              {['All planning designations: planning.data.gov.uk (MHCLG)','Flood Zone 2/3: EA Flood Map for Planning (manual — flood-map-for-planning.service.gov.uk)','Mapping: OpenStreetMap contributors via Leaflet','Geocoding: Nominatim'].map((s,i)=><li key={i} style={li}>{s}</li>)}
            </ul>
          </div>

          <div><div style={h2}>Limitations</div>
            <ul style={{paddingLeft:20}}>
              {['Distance is measured from the nearest site boundary vertex to each designation\'s representative point — not centroid-to-centroid. This is far more accurate for large or irregular sites.','The search radius for all layers is automatically expanded by 20% (minimum +500m) to avoid missing features whose representative point sits just just outside the nominal distance. Distance-filtering is applied client-side on the returned results.','On-site detection for polygon designations uses a two-step approach: (1) the site polygon WKT is sent directly to planning.data.gov.uk for a true geometry intersection check; (2) for point features (e.g. Listed Buildings), a ray-cast is performed client-side against the site polygon.','Flood zone data requires manual verification via the EA Flood Map for Planning.','Cumulative effects, transboundary impacts, and project-specific characteristics are not assessed.','This tool is not a substitute for professional EIA advice on complex or sensitive proposals.'].map((s,i)=><li key={i} style={li}>{s}</li>)}
            </ul>
          </div>
        </div>
        <button onClick={onBack} style={{background:C.navy,color:C.white,border:'none',borderRadius:5,padding:'9px 18px',cursor:'pointer',fontFamily:F,fontWeight:700,fontSize:13,marginTop:16}}>← Return to tool</button>
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
</script>
</body>
</html>
